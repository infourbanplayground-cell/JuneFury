const API_URL = "https://script.google.com/macros/s/AKfycbxSswi_DW5JOeZPwGXpgIWHasA89nep1SY_TpQnVXKeTLcdwPhl8SgDhmqKcFp-mDywHA/exec";

function apiGet(action, params = {}) {
  if (!API_URL || API_URL.includes("PASTE_YOUR")) return Promise.reject(new Error("API not configured"));
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Date.now() + "_" + Math.random().toString(36).slice(2, 8);
    const timer = setTimeout(() => { cleanup(); reject(new Error("Timeout")); }, 15000);
    function cleanup() { clearTimeout(timer); delete window[cb]; try { document.body.removeChild(s); } catch (e) {} }
    window[cb] = (data) => { cleanup(); resolve(data); };
    const qs = new URLSearchParams({ ...params, action, callback: cb });
    const s = document.createElement("script");
    s.src = API_URL + "?" + qs.toString();
    console.log("[JF]", action, "url_len=" + s.src.length);
    s.onerror = () => { cleanup(); reject(new Error("Network error (url_len=" + s.src.length + ")")); };
    document.body.appendChild(s);
  });
}

async function apiPost(body) {
  if (body.action === "saveState") {
    return saveStateChunked(body.state);
  }
  if (!API_URL || API_URL.includes("PASTE_YOUR")) throw new Error("API not configured");
  await fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(body),
  });
  return { ok: true };
}

// Base64url encode: UTF-8 safe, URL-safe chars only (no percent-encoding).
// Arabic/special chars in JSON expand at 1.33× instead of up to 6× with raw URL encoding.
function toB64url(str) {
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function saveStateChunked(state) {
  const json = JSON.stringify(state);
  // Encode ENTIRE JSON first → safe string, then split into 3000-char pieces.
  // Arabic JSON chunks encoded per-piece could hit 8000 base64 chars (2000×3 UTF-8×4/3).
  // Splitting the already-encoded string guarantees exactly 3000 URL-safe chars per chunk.
  const b64 = toB64url(json);
  const CHUNK = 1500;
  const total = Math.ceil(b64.length / CHUNK);
  const sid = "s" + Date.now().toString(36);
  for (let i = 0; i < total; i++) {
    const chunk = b64.slice(i * CHUNK, (i + 1) * CHUNK);
    let r, lastErr;
    for (let attempt = 0; attempt < 3; attempt++) {
      try { r = await apiGet("saveChunk", { sid, i, total, chunk, b64: 1 }); lastErr = null; break; }
      catch (e) { lastErr = e; await new Promise(res => setTimeout(res, 400 * (attempt + 1))); }
    }
    if (lastErr) throw new Error("Network error saving chunk " + (i + 1) + "/" + total + " — check connection");
    if (r && r.ok === false && !r.pending) {
      const msg = r.error || "Unknown";
      if (msg.includes("Unknown action") || msg.includes("b64") || msg.includes("decodeB64")) {
        throw new Error("⚠️ Code.gs is outdated — paste the new Code.gs and redeploy (New version)");
      }
      throw new Error("Backend error: " + msg);
    }
  }
  return { ok: true };
}

function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, (_, i) => Array.from({length: n+1}, (_, j) => i || j));
  for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++)
    dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}
function fuzzyMatch(name, candidates, threshold = 3) {
  const nl = name.toLowerCase();
  let best = null, bestDist = Infinity;
  for (const c of candidates) { const d = levenshtein(nl, c.toLowerCase()); if (d < bestDist) { bestDist = d; best = c; } }
  return bestDist <= threshold && bestDist > 0 ? { match: best, dist: bestDist } : null;
}
function parseWhatsAppNames(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const waPattern = /^\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4},? \d{1,2}:\d{2}(?::\d{2})?(?: [AP]M)? [-–] (.+?): /;
  const systemKw = ['end-to-end','changed','added','removed','left','created','pinned','security code','joined using','using this link','number changed'];
  const isWA = lines.some(l => waPattern.test(l));
  const names = new Set();
  if (isWA) {
    lines.forEach(l => {
      const m = l.match(waPattern);
      if (!m) return;
      const sender = m[1].trim();
      if (sender.startsWith('+') || sender.match(/^\d/)) return;
      const body = l.slice(m[0].length).toLowerCase();
      if (systemKw.some(k => body.startsWith(k) || sender.toLowerCase().includes(k))) return;
      names.add(sender);
    });
  } else {
    lines.forEach(l => { if (l.length > 1 && l.length < 60 && !/^\+?\d[\d\s\-()]+$/.test(l)) names.add(l); });
  }
  return [...names];
}
function parseTeamsFromText(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const waPattern = /^\d{1,2}[\/\-.]\d{1,2}[\/\-.]\d{2,4},? \d{1,2}:\d{2}(?::\d{2})?(?: [AP]M)? [-–] (.+?): (.*)/;
  const teams = [];
  const parsePair = (line) => {
    line = line.replace(/^(?:team|فريق)\s*\d+\s*[:\-]\s*/i, '').trim();
    for (const sep of [' & ', ' / ', ' – ', ' - ', ' vs ', ', ']) {
      const idx = line.indexOf(sep);
      if (idx < 1) continue;
      const n1 = line.slice(0, idx).trim(), n2 = line.slice(idx + sep.length).trim();
      if (n1.length > 1 && n2.length > 1 && n1.length < 60 && n2.length < 60) return [n1, n2];
    }
    return null;
  };
  if (lines.some(l => waPattern.test(l))) {
    lines.forEach(l => { const m = l.match(waPattern); if (!m) return; const p = parsePair(m[2]); if (p) teams.push(p); });
  } else {
    lines.forEach(l => { const p = parsePair(l); if (p) teams.push(p); });
  }
  return teams;
}

function resolvePlayer(name, players) {
  const exact = players.find(p => p.name.toLowerCase() === name.toLowerCase());
  if (exact) return exact;
  const f = fuzzyMatch(name, players.map(p => p.name), 3);
  return f ? players.find(p => p.name === f.match) : null;
}

// ─── Smart partial-name matching (players write short names on WhatsApp) ───
function normName(s) {
  return (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z0-9\s]/g, " ").replace(/\s+/g, " ").trim();
}
function scoreNameMatch(input, fullName) {
  const a = normName(input), b = normName(fullName);
  if (!a || !b) return 0;
  if (a === b) return 100;
  const at = a.split(" "), bt = b.split(" ");
  if (b.startsWith(a + " ")) return 96;          // "ahmed" → "ahmed al wahaibi"
  if (a.startsWith(b + " ")) return 93;          // "ahmed al wahaibi extra" → "ahmed al"
  if (at[0] === bt[0]) {                          // first name exact
    if (at[1]) return bt.some((t, i) => i > 0 && (t.startsWith(at[1]) || at[1].startsWith(t))) ? 90 : 68;
    return 80;
  }
  // any token prefix overlap (handles "moh" → "mohammed")
  let tokenHit = false;
  for (const x of at) if (x.length >= 3 && bt.some(y => y.startsWith(x) || x.startsWith(y))) tokenHit = true;
  if (tokenHit) return 62;
  const d0 = levenshtein(at[0], bt[0]);           // typo in first name
  if (d0 === 0) return 78;
  if (d0 === 1) return 56;
  if (d0 === 2 && at[0].length >= 4) return 44;
  const dd = levenshtein(a, b);                   // typo in whole string
  if (dd <= 2) return 48;
  if (dd <= 3) return 34;
  return 0;
}
function resolvePlayerSmart(name, players) {
  const scored = players.map(p => ({ player: p, score: scoreNameMatch(name, p.name) }))
    .filter(s => s.score > 0).sort((a, b) => b.score - a.score);
  if (!scored.length) return { player: null, candidates: [], ambiguous: false };
  const best = scored[0];
  // ambiguous when 2+ strong matches are within 8 pts (e.g. two "Ahmed"s)
  const close = scored.filter(s => best.score - s.score <= 8 && s.score >= 60);
  return { player: best.player, score: best.score, candidates: scored.slice(0, 5).map(s => s.player), ambiguous: close.length > 1 };
}

function getSessionGroups(session) {
  return GROUPS.slice(0, session?.groupCount || 4);
}
function getQualifyCount(session) {

}

function initState() {

function getPlayerTeam(s, pid) { return (s.teams || []).find(t => t.p1Id === pid || t.p2Id === pid); }
function teamWon(m, tid) { if (!m || !m.winner) return false; if (m.winner === "team1") return m.team1Id === tid; if (m.winner === "team2") return m.team2Id === tid; return false; }

function calcGroupStandings(session, group) {
  const teams = (session.teams || []).filter(t => t.group === group);
  return teams.map(team => {
    let pts = 0, wins = 0, played = 0;
    (session.groupMatches || []).forEach(m => {
      if (m.team1Id !== team.id && m.team2Id !== team.id) return;
      if (!m.winner) return; played++;
      if (teamWon(m, team.id)) { pts += 3; wins++; }
      else { const t = m.lossType || "tiebreak"; if (t === "tiebreak") pts += 2; else if (t === "competitive") pts += 1; }
    });
    return { team, pts, wins, played };
  }).sort((a, b) => b.pts - a.pts || b.wins - a.wins);
}

function getTopOfGroup(s, g) { const ov = s.topOfGroupOverride && s.topOfGroupOverride[g]; if (ov) return ov; const r = calcGroupStandings(s, g); return r[0]?.team?.id || null; }

function calcStreak(idxs) {
  if (!idxs?.length) return 0;
  const sorted = [...idxs].sort((a, b) => a - b);
  let total = 0, len = 0, last = null;
  for (const i of sorted) {
    if (last === null || i === last + 1) len++; else len = 1;
    last = i;
    if (len === 1 || len === 2 || len === 3) total += 1;
    else if (len === 4) total += 2;
  }
  return Math.min(total, 5);
}

function calcPlayerStats(pid, sessions) {
  let total = 0;
  const breakdown = { matchPts: 0, topOfGroup: 0, knockoutPts: 0, streakPts: 0 };
  const stats = { groupWins: 0, groupPlayed: 0, sessionsPlayed: 0, qfReached: 0, sfReached: 0, finalsReached: 0, finalsWon: 0 };
  const attended = [];
  const partners = {};
  sessions.forEach((s, idx) => {
    const team = getPlayerTeam(s, pid); if (!team) return;
    attended.push(idx); stats.sessionsPlayed++;
    const partnerId = team.p1Id === pid ? team.p2Id : team.p1Id;
    partners[partnerId] = (partners[partnerId] || 0) + 1;
    // 2X Double Points (applies to everything except streak)
    const mult = s.doublePoints ? 2 : 1;
    (s.groupMatches || []).forEach(m => {
      if (m.team1Id !== team.id && m.team2Id !== team.id) return;
      if (!m.winner) return; stats.groupPlayed++;
      if (teamWon(m, team.id)) { total += 3 * mult; breakdown.matchPts += 3 * mult; stats.groupWins++; }
      else { const t = m.lossType || "tiebreak"; const p = t === "tiebreak" ? 2 : t === "competitive" ? 1 : 0; total += p * mult; breakdown.matchPts += p * mult; }
    });
    if (getTopOfGroup(s, team.group) === team.id) { total += 1 * mult; breakdown.topOfGroup += 1 * mult; }
    const qf = s.bracket?.qf?.find(m => m.team1Id === team.id || m.team2Id === team.id);
    if (qf) { total += 1 * mult; breakdown.knockoutPts += 1 * mult; stats.qfReached++;
      if (teamWon(qf, team.id)) {
        const sf = s.bracket?.sf?.find(m => m.team1Id === team.id || m.team2Id === team.id);
        if (sf) { total += 2 * mult; breakdown.knockoutPts += 2 * mult; stats.sfReached++;
          if (teamWon(sf, team.id)) {
            const f = s.bracket?.final;
            if (f && (f.team1Id === team.id || f.team2Id === team.id)) { total += 3 * mult; breakdown.knockoutPts += 3 * mult; stats.finalsReached++;
              if (teamWon(f, team.id)) { total += 5 * mult; breakdown.knockoutPts += 5 * mult; stats.finalsWon++; }
            }}}}}
  });
  const streak = calcStreak(attended); total += streak; breakdown.streakPts = streak;
  return { totalPts: total, breakdown, stats, attended, partners };
}

function getLockedPartners(pid, sessions) {
  const locked = new Set();
  sessions.forEach(s => {
    const team = getPlayerTeam(s, pid); if (!team) return;
    const partnerId = team.p1Id === pid ? team.p2Id : team.p1Id;
    const wonAny = (s.groupMatches || []).some(m => (m.team1Id === team.id || m.team2Id === team.id) && teamWon(m, team.id))
      || [...(s.bracket?.qf || []), ...(s.bracket?.sf || []), s.bracket?.final].some(m => m && (m.team1Id === team.id || m.team2Id === team.id) && teamWon(m, team.id));
    if (wonAny) locked.add(partnerId);
  });
  return locked;
}

  return (
    <div className="shrink-0 flex items-center justify-center" style={{ width: size, height: size }}>

// ═══════════════════════════════════════════════════════════════
// 🎨 UI PRIMITIVES
// ═══════════════════════════════════════════════════════════════
function Pill({ children, color = "orange" }) {
  const map = {
    orange: "bg-orange-500/15 text-orange-400 border-orange-500/30",
    red: "bg-red-500/15 text-red-400 border-red-500/30",
    amber: "bg-amber-400/15 text-amber-300 border-amber-400/30",
    blue: "bg-blue-500/15 text-blue-300 border-blue-500/30",
    stone: "bg-stone-500/15 text-stone-300 border-stone-500/30",
    green: "bg-emerald-500/15 text-emerald-300 border-emerald-500/30",
  };
  return <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded-md text-xs font-semibold border ${map[color]}`}>{children}</span>;
}

function Btn({ children, onClick, variant = "primary", size = "md", className = "", disabled, type = "button" }) {
  const base = "inline-flex items-center justify-center gap-2 rounded-lg font-semibold transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed";
  const v = {
    primary: "bg-gradient-to-b from-orange-500 to-red-600 text-white shadow-lg shadow-orange-500/20",
    secondary: "bg-stone-800 text-stone-100 border border-stone-700",
    ghost: "text-stone-300 hover:bg-stone-800",
    danger: "bg-red-900/40 text-red-300 border border-red-800/50",
    gold: "bg-gradient-to-b from-amber-300 to-amber-500 text-stone-950 shadow-lg shadow-amber-500/20",
  };
  const sz = { sm: "px-3 py-1.5 text-xs", md: "px-4 py-2 text-sm", lg: "px-5 py-3 text-base" };
  return <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${v[variant]} ${sz[size]} ${className}`}>{children}</button>;
}

function Card({ children, className = "", onClick }) {
  return <div onClick={onClick} className={`bg-stone-900/60 border border-stone-800 rounded-xl backdrop-blur ${onClick ? "cursor-pointer active:scale-[0.99] transition-transform" : ""} ${className}`}>{children}</div>;
}

function Input({ value, onChange, placeholder, className = "", type = "text", autoFocus }) {
  return <input type={type} value={value || ""} onChange={e => onChange(e.target.value)} placeholder={placeholder} autoFocus={autoFocus} className={`w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-stone-100 placeholder-stone-500 focus:outline-none focus:border-orange-500 ${className}`} />;
}

function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" onClick={onClose}>
      <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" />
      <div onClick={e => e.stopPropagation()} className="relative w-full max-w-lg bg-stone-950 border border-stone-800 rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto">
        <div className="sticky top-0 bg-stone-950/95 backdrop-blur border-b border-stone-800 px-4 py-3 flex items-center justify-between z-10">
          <h2 className="font-display text-xl text-stone-100">{title}</h2>
          <button onClick={onClose} className="text-stone-400 hover:text-stone-100 p-1"><I.x size={20} /></button>
        </div>
        <div className="p-4">{children}</div>
      </div>
    </div>
  );
}

function PlayerPicker({ players, value, onChange, exclude = [], placeholder = "Pick player" }) {
  const [open, setOpen] = useState(false);
  const [search, setSearch] = useState("");
  const ref = useRef();
  useEffect(() => { const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }; document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h); }, []);
  const sel = players.find(p => p.id === value);
  const avail = players.filter(p => !exclude.includes(p.id) && (!search || p.name.toLowerCase().includes(search.toLowerCase())));
  return (
    <div className="relative" ref={ref}>
      <button type="button" onClick={() => setOpen(!open)} className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-left flex items-center justify-between">
        <span className={sel ? "text-stone-100" : "text-stone-500"}>{sel?.name || placeholder}</span>
        <I.chev size={16} className={`transition-transform ${open ? "rotate-90" : ""}`} />
      </button>
      {open && (
        <div className="absolute z-20 mt-1 w-full bg-stone-900 border border-stone-700 rounded-lg shadow-2xl max-h-64 overflow-y-auto">
          <div className="sticky top-0 bg-stone-900 p-2 border-b border-stone-800">
            <div className="relative">
              <I.search size={14} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-stone-500" />
              <input autoFocus value={search} onChange={e => setSearch(e.target.value)} placeholder="Search…" className="w-full bg-stone-800 rounded-md pl-8 pr-2 py-1.5 text-sm text-stone-100 focus:outline-none" />
            </div>
          </div>
          {avail.length === 0 ? <div className="px-3 py-4 text-sm text-stone-500 text-center">No players found</div>
            : avail.map(p => <button key={p.id} type="button" onClick={() => { onChange(p.id); setOpen(false); setSearch(""); }} className="w-full text-left px-3 py-2 hover:bg-stone-800 text-stone-100 text-sm border-b border-stone-800/50 last:border-0">{p.name}</button>)}
        </div>
      )}
    </div>
  );
}

function Avatar({ player, size = 40, className = "" }) {
  const initials = (player.name || "?").split(" ").map(n => n[0]).join("").slice(0, 2).toUpperCase();
  const [imgErr, setImgErr] = useState(false);
  if (player.photoUrl && !imgErr) {
    return <img src={player.photoUrl} alt={player.name} onError={() => setImgErr(true)}
      className={`rounded-full object-cover shrink-0 ${className}`} style={{ width: size, height: size }} />;
  }
  return (
    <div className={`rounded-full flex items-center justify-center shrink-0 font-bold text-stone-100 ${className}`}
      style={{ width: size, height: size, background: "linear-gradient(135deg,#44403c,#292524)", fontSize: size * 0.35 }}>
      {initials}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// 🎯 MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [state, setState] = useState(null);
  const [tab, setTab] = useState("dashboard");
  const [openSessionId, setOpenSessionId] = useState(null);
  const [openPlayerId, setOpenPlayerId] = useState(null);
  const [isAdmin, setIsAdmin] = useState(() => localStorage.getItem(ADMIN_KEY) === "yes");
  const [showLogin, setShowLogin] = useState(false);
  const [sync, setSync] = useState("idle");
  const [syncErr, setSyncErr] = useState("");
  const saveTimer = useRef();
  const pollTimer = useRef();
  const initialLoaded = useRef(false);

  useEffect(() => {
    (async () => {
      try {
        const res = await apiGet("getState");
        if (res?.ok && res.state) {
          setState(res.state);
          localStorage.setItem(LOCAL_KEY, JSON.stringify(res.state));
          setSync("idle");
          initialLoaded.current = true;
          document.getElementById("splash")?.remove();
          return;
        }
      } catch (e) { setSync("offline"); }
      try {
        const cached = localStorage.getItem(LOCAL_KEY);
        setState(cached ? JSON.parse(cached) : initState());
      } catch (e) { setState(initState()); }
      initialLoaded.current = true;
      document.getElementById("splash")?.remove();
    })();
  }, []);

  useEffect(() => {
    if (!state || !initialLoaded.current) return;
    try { localStorage.setItem(LOCAL_KEY, JSON.stringify(state)); } catch (e) {}
    if (!isAdmin) return;
    clearTimeout(saveTimer.current);
    setSync("syncing");
    saveTimer.current = setTimeout(async () => {
      try { await apiPost({ action: "saveState", state }); setSync("idle"); setSyncErr(""); }
      catch (e) { setSync("error"); setSyncErr(e.message || "Unknown sync error"); }
    }, 600);
  }, [state, isAdmin]);

  useEffect(() => {
    if (isAdmin) return;
    pollTimer.current = setInterval(async () => {
      try {
        const res = await apiGet("getState");
        if (res?.ok && res.state) {
          setState(s => (JSON.stringify(s) !== JSON.stringify(res.state) ? res.state : s));
          setSync("idle");
        }
      } catch (e) { setSync("offline"); }
    }, 30000);
    return () => clearInterval(pollTimer.current);
  }, [isAdmin]);

  const handleLogin = async (pin) => {
    try { const r = await apiGet("unlock", { pin }); if (r?.ok) { setIsAdmin(true); localStorage.setItem(ADMIN_KEY, "yes"); setShowLogin(false); return true; } return false; }
    catch (e) { return false; }
  };
  const logout = () => { setIsAdmin(false); localStorage.removeItem(ADMIN_KEY); };

  if (!state) return null;

  const update = (fn) => setState(s => fn({ ...s }));
  const updateSession = (sid, fn) => setState(s => ({ ...s, sessions: s.sessions.map(ss => ss.id === sid ? fn({ ...ss }) : ss) }));
  const leaderboard = state.players.map(p => { const s = calcPlayerStats(p.id, state.sessions); return { player: p, ...s, lifetimePts: s.totalPts + (p.prevSeriesPoints || 0) }; }).sort((a, b) => b.totalPts - a.totalPts);
  const currentSession = state.sessions.find(s => s.id === openSessionId);

  return (
    <div className="min-h-screen text-stone-100" style={{ background: "radial-gradient(ellipse at top, rgba(249, 115, 22, 0.08) 0%, transparent 50%), radial-gradient(ellipse at bottom, rgba(220, 38, 38, 0.05) 0%, transparent 50%), #0a0807" }}>
      <header className="sticky top-0 z-30 backdrop-blur-xl border-b border-stone-800/80" style={{ background: "rgba(10, 8, 7, 0.85)" }}>
        <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between gap-3">
          <div className="flex items-center gap-3 min-w-0">
            <UPLogo size={40} />
            <div className="min-w-0">
              <div className="font-display text-2xl leading-none truncate" style={{ background: "linear-gradient(180deg, #fbbf24 0%, #f97316 45%, #dc2626 100%)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" }}>{state.seasonName}</div>
              <div className="text-[10px] text-stone-500 uppercase tracking-widest font-semibold mt-0.5 truncate">{state.seasonSubtitle || "Urban Playground"}</div>
            </div>
          </div>
          <div className="flex items-center gap-2 shrink-0">
            <SyncIndicator status={sync} errMsg={syncErr} />
            {isAdmin ? <button onClick={() => setTab("settings")} className="text-stone-400 hover:text-orange-500 p-2"><I.settings size={18} /></button>
              : <button onClick={() => setShowLogin(true)} className="text-stone-400 hover:text-orange-500 p-2"><I.lock size={18} /></button>}
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-4 py-4 pb-24">
        {tab === "dashboard" && <DashboardView state={state} leaderboard={leaderboard} setTab={setTab} setOpenSessionId={setOpenSessionId} isAdmin={isAdmin} />}
        {tab === "players" && <PlayersView state={state} update={update} setOpenPlayerId={setOpenPlayerId} isAdmin={isAdmin} />}
        {tab === "sessions" && <SessionsView state={state} update={update} setOpenSessionId={setOpenSessionId} isAdmin={isAdmin} />}
        {tab === "leaderboard" && <LeaderboardView leaderboard={leaderboard} state={state} setOpenPlayerId={setOpenPlayerId} />}
        {tab === "settings" && isAdmin && <SettingsView state={state} update={update} setState={setState} setTab={setTab} logout={logout} />}
      </main>

      <nav className="fixed bottom-0 inset-x-0 z-30 border-t border-stone-800/80 backdrop-blur-xl" style={{ background: "rgba(10, 8, 7, 0.92)" }}>
        <div className="max-w-3xl mx-auto grid grid-cols-4 px-2 py-1.5">
          {[{id:"dashboard",icon:I.flame,label:"Home"},{id:"sessions",icon:I.calendar,label:"Sessions"},{id:"leaderboard",icon:I.trophy,label:"Rank"},{id:"players",icon:I.users,label:"Players"}].map(t => {
            const A = t.icon;
            return <button key={t.id} onClick={() => setTab(t.id)} className={`flex flex-col items-center gap-0.5 py-2 rounded-lg transition-colors ${tab === t.id ? "" : "text-stone-500"}`} style={tab === t.id ? { color: "var(--blue)" } : {}}>
              <A size={20} /><span className="text-[10px] font-semibold tracking-wide uppercase">{t.label}</span>
            </button>;
          })}
        </div>
      </nav>

      {currentSession && <SessionDetail session={currentSession} state={state} isAdmin={isAdmin} onClose={() => setOpenSessionId(null)} updateSession={(fn) => updateSession(currentSession.id, fn)} deleteSession={() => { update(s => ({ ...s, sessions: s.sessions.filter(ss => ss.id !== currentSession.id) })); setOpenSessionId(null); }} leaderboard={leaderboard} />}
      {openPlayerId && <PlayerDetail playerId={openPlayerId} state={state} leaderboard={leaderboard} onClose={() => setOpenPlayerId(null)} />}
      {showLogin && <LoginModal onClose={() => setShowLogin(false)} onLogin={handleLogin} />}
    </div>
  );
}

function SyncIndicator({ status, errMsg }) {
  const map = { idle:{color:"#10b981",label:"Synced"}, syncing:{color:"#f59e0b",label:"Syncing"}, error:{color:"#ef4444",label:"Sync error"}, offline:{color:"#a8a29e",label:"Offline"} };
  const s = map[status] || map.idle;
  const onClick = () => { if (status === "error" && errMsg) alert("Sync error:\n\n" + errMsg); };
  return <div onClick={onClick} className={`flex items-center gap-1.5 text-[10px] uppercase font-semibold tracking-wider ${status === "error" ? "cursor-pointer" : ""}`} title={status === "error" ? (errMsg || s.label) : s.label}>
    <div className="w-2 h-2 rounded-full" style={{ background: s.color, boxShadow: `0 0 8px ${s.color}` }} />
    <span className="text-stone-500 hidden sm:inline">{s.label}</span>
  </div>;
}

function LoginModal({ onClose, onLogin }) {
  const [pin, setPin] = useState("");
  const [err, setErr] = useState("");
  const submit = async () => { setErr(""); const ok = await onLogin(pin); if (!ok) setErr("Wrong PIN"); };
  return <Modal open={true} onClose={onClose} title="ORGANIZER LOGIN">
    <div className="space-y-3">
      <div className="text-xs text-stone-400">Enter the organizer PIN to unlock editing.</div>
      <input autoFocus type="password" value={pin} onChange={e => setPin(e.target.value)} placeholder="••••" onKeyDown={e => e.key === "Enter" && submit()} className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-3 text-center text-2xl font-mono text-stone-100 tracking-widest focus:outline-none focus:border-orange-500" />
      {err && <div className="text-xs text-red-400 text-center">{err}</div>}
      <Btn className="w-full" onClick={submit}><I.unlock size={14} /> Unlock</Btn>
    </div>
  </Modal>;
}

function WhatsAppImportModal({ onClose, onAdd, existing }) {
  const [text, setText] = useState("");
  const [step, setStep] = useState("paste");
  const [checked, setChecked] = useState({});
  const existingNames = existing.map(p => p.name);

  const parsed = useMemo(() => {
    if (!text.trim()) return [];
    return parseWhatsAppNames(text).map(name => {
      const exactMatch = existingNames.find(e => e.toLowerCase() === name.toLowerCase());
      if (exactMatch) return { name, status: "existing", suggestion: null };
      const fuzzy = fuzzyMatch(name, existingNames);
      return { name, status: fuzzy ? "fuzzy" : "new", suggestion: fuzzy?.match || null };
    });
  }, [text]);

  const freshItems = parsed.filter(p => p.status !== "existing");
  const toAdd = freshItems.filter(p => checked[p.name] !== false && p.status === "new")
    .concat(freshItems.filter(p => checked[p.name] === true && p.status === "fuzzy"));

  return <Modal open={true} onClose={onClose} title="IMPORT PLAYERS">
    <div className="space-y-3">
      {step === "paste" ? <>
        <div className="text-xs text-stone-400">Paste a WhatsApp chat export or a plain list of names (one per line).</div>
        <textarea value={text} onChange={e => setText(e.target.value)} rows={10}
          placeholder={"31/05/2025, 10:23 - Hassan: Hey\n31/05/2025, 10:24 - Faisal: Ready!\n\nOR just:\nHassan Al Salhi\nFaisal Al Harthi"}
          className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-stone-100 font-mono text-xs focus:outline-none focus:border-orange-500" />
        <div className="flex gap-2">
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          <Btn onClick={() => setStep("review")} disabled={!text.trim()}>Extract Names →</Btn>
        </div>
      </> : <>
        <div className="text-xs text-stone-400 mb-2">{parsed.length} names found · {freshItems.length} new</div>
        <div className="space-y-1.5 max-h-72 overflow-y-auto">
          {parsed.map(p => (
            <div key={p.name} className="flex items-center gap-2 px-3 py-2 rounded-lg text-sm" style={{
              background: p.status === "existing" ? "rgba(16,185,129,0.06)" : p.status === "fuzzy" ? "rgba(251,191,36,0.06)" : "rgba(28,25,23,0.7)",
              border: p.status === "existing" ? "1px solid rgba(16,185,129,0.2)" : p.status === "fuzzy" ? "1px solid rgba(251,191,36,0.25)" : "1px solid rgba(68,64,60,0.5)"
            }}>
              {p.status === "existing" ? (
                <><Icon d='<path d="M20 6L9 17l-5-5"/>' size={14} style={{color:"#10b981"}} /><span className="flex-1 text-stone-400 line-through">{p.name}</span><span className="text-[10px] text-emerald-500">already in</span></>
              ) : p.status === "fuzzy" ? (
                <><input type="checkbox" checked={checked[p.name] === true} onChange={e => setChecked(c => ({...c, [p.name]: e.target.checked}))} className="accent-orange-500" />
                <div className="flex-1 min-w-0">
                  <div className="text-stone-200">{p.name}</div>
                  <div className="text-[10px] text-amber-400">Similar to: {p.suggestion} — check to add as new</div>
                </div></>
              ) : (
                <><input type="checkbox" checked={checked[p.name] !== false} onChange={e => setChecked(c => ({...c, [p.name]: e.target.checked}))} className="accent-orange-500" />
                <span className="flex-1 text-stone-100">{p.name}</span>
                <span className="text-[10px] text-emerald-400">new</span></>
              )}
            </div>
          ))}
        </div>
        <div className="flex gap-2 pt-1">
          <Btn variant="ghost" onClick={() => setStep("paste")}>← Back</Btn>
          <Btn onClick={() => { onAdd(toAdd.map(p => ({ id: uid("p"), name: p.name, addedAt: Date.now() }))); onClose(); }} disabled={!toAdd.length}>Add {toAdd.length} Players</Btn>
        </div>
      </>}
    </div>
  </Modal>;
}

function WhatsAppTeamImportModal({ onClose, state, session, leaderboard, onImport }) {
  const [text, setText] = useState("");
  const [step, setStep] = useState("paste");
  const [rows, setRows] = useState([]); // [{n1,n2,sel1,sel2,amb1,amb2,skip}]
  const groups = getSessionGroups(session);
  const existingPairs = new Set((session.teams || []).map(t => [t.p1Id, t.p2Id].sort().join("|")));

  const buildRows = () => {
    const parsed = parseTeamsFromText(text).map(([n1, n2]) => {
      const r1 = resolvePlayerSmart(n1, state.players);
      const r2 = resolvePlayerSmart(n2, state.players);
      return {
        n1, n2,
        sel1: r1.player?.id || "", sel2: r2.player?.id || "",
        amb1: r1.ambiguous, amb2: r2.ambiguous,
      };
    });
    setRows(parsed);
    setStep("review");
  };

  const setSel = (i, key, val) => setRows(rs => rs.map((r, j) => j === i ? { ...r, [key]: val } : r));
  const toggleSkip = (i) => setRows(rs => rs.map((r, j) => j === i ? { ...r, skip: !r.skip } : r));

  const status = (r) => {
    if (!r.sel1 || !r.sel2) return "unmatched";
    if (r.sel1 === r.sel2) return "samepair";
    if (existingPairs.has([r.sel1, r.sel2].sort().join("|"))) return "dup";
    return "ok";
  };
  const importable = rows.filter(r => !r.skip && status(r) === "ok");

  const handleImport = () => {
    const newTeams = importable.map(r => ({ id: uid("t"), p1Id: r.sel1, p2Id: r.sel2, group: groups[0] }));
    onImport(newTeams);
    onClose();
  };

  const sortedPlayers = useMemo(() => [...state.players].sort((a, b) => a.name.localeCompare(b.name)), [state.players]);
  const NameSelect = ({ raw, value, ambiguous, onChange }) => (
    <div className="flex-1 min-w-0">
      <div className="text-[10px] text-stone-500 truncate">"{raw}"</div>
      <select value={value} onChange={e => onChange(e.target.value)}
        className={`w-full bg-stone-900 border rounded-md px-2 py-1.5 text-xs text-stone-100 ${!value ? "border-red-500/60" : ambiguous ? "border-amber-500/60" : "border-stone-700"}`}>
        <option value="">— pick player —</option>
        {sortedPlayers.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
      </select>
    </div>
  );

  return <Modal open={true} onClose={onClose} title="IMPORT TEAMS">
    <div className="space-y-3">
      {step === "paste" ? <>
        <div className="text-xs text-stone-400">Paste WA chat export or plain list. One team per line, separated by&nbsp;<code className="text-orange-400">&amp;</code> or <code className="text-orange-400">/</code>. Short names get matched automatically — confirm on next step.</div>
        <textarea value={text} onChange={e => setText(e.target.value)} rows={10}
          placeholder={"Ahmed & Khalid\nMoh / Sultan\nFaisal & Omar\n\nOR from WA export:\n31/05/2025, 10:23 - Coach: Ahmed & Khalid"}
          className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-stone-100 font-mono text-xs focus:outline-none focus:border-orange-500" />
        <div className="flex gap-2">
          <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
          <Btn onClick={buildRows} disabled={!text.trim()}>Extract Teams →</Btn>
        </div>
      </> : <>
        <div className="text-xs text-stone-400">{rows.length} pairs · {importable.length} ready. <span className="text-amber-400">Amber</span> = unsure, check it. <span className="text-red-400">Red</span> = pick manually.</div>
        <div className="space-y-2 max-h-80 overflow-y-auto pr-1">
          {rows.map((r, i) => {
            const st = status(r);
            const bg = st === "dup" ? "rgba(16,185,129,0.06)" : st === "ok" ? "rgba(28,25,23,0.7)" : "rgba(239,68,68,0.06)";
            return (
              <div key={i} className="px-2.5 py-2 rounded-lg" style={{ background: bg, border: "1px solid rgba(68,64,60,0.5)" }}>
                <div className="flex items-center gap-2">
                  <input type="checkbox" checked={!r.skip && st !== "dup"} disabled={st === "dup"} onChange={() => toggleSkip(i)} className="accent-orange-500 shrink-0" />
                  <NameSelect raw={r.n1} value={r.sel1} ambiguous={r.amb1} onChange={v => setSel(i, "sel1", v)} />
                  <span className="text-stone-500 shrink-0">&</span>
                  <NameSelect raw={r.n2} value={r.sel2} ambiguous={r.amb2} onChange={v => setSel(i, "sel2", v)} />
                </div>
                {st === "dup" && <div className="text-[10px] text-emerald-500 mt-1 pl-6">Already in this session</div>}
                {st === "samepair" && <div className="text-[10px] text-red-400 mt-1 pl-6">Same player twice</div>}
                {(r.amb1 || r.amb2) && st === "ok" && <div className="text-[10px] text-amber-400 mt-1 pl-6">Multiple possible matches — verify</div>}
              </div>
            );
          })}
        </div>
        <div className="flex gap-2 pt-1">
          <Btn variant="ghost" onClick={() => setStep("paste")}>← Back</Btn>
          <Btn onClick={handleImport} disabled={!importable.length}>Import {importable.length} + Auto-Seed</Btn>
        </div>
      </>}
    </div>
  </Modal>;
}

function TeamsTab({ session, state, updateSession, isAdmin, leaderboard }) {
  const [showAdd, setShowAdd] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [edit, setEdit] = useState(null);
  const teams = session.teams || [];
  const groups = getSessionGroups(session);
  const maxTeams = groups.length * 4;
  const byGroup = groups.reduce((a, g) => (a[g] = teams.filter(t => t.group === g), a), {});

  const serpentineSeed = (allTeams) => {
    const rankOf = (pid) => { const idx = (leaderboard || []).findIndex(e => e.player.id === pid); return idx === -1 ? 999 : idx; };
    const ranked = [...allTeams].sort((a, b) => (rankOf(a.p1Id) + rankOf(a.p2Id)) - (rankOf(b.p1Id) + rankOf(b.p2Id)));
    const assign = [];
    let dir = 1, gi = 0;
    for (let i = 0; i < ranked.length; i++) {
      assign.push(groups[gi]);
      gi += dir;
      if (gi >= groups.length) { gi = groups.length - 1; dir = -1; }
      else if (gi < 0) { gi = 0; dir = 1; }
    }
    return ranked.map((t, i) => ({ ...t, group: assign[i] }));
  };

  const autoSeedGroups = () => {
    if (teams.length === 0) return;
    const seeded = serpentineSeed(teams);
    updateSession(s => ({ ...s, teams: s.teams.map(t => { const u = seeded.find(r => r.id === t.id); return u ? { ...t, group: u.group } : t; }) }));
  };

  const handleImport = (newTeams) => {
    updateSession(s => {
      const all = [...(s.teams || []), ...newTeams];
      const seeded = serpentineSeed(all);
      return { ...s, teams: seeded };
    });
  };

  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between flex-wrap gap-2">
        <div><div className="text-stone-200 font-semibold">{teams.length} / {maxTeams} teams</div>{isAdmin && <div className="text-xs text-stone-500">Tap team to edit · {groups.length} groups</div>}</div>
        {isAdmin && <div className="flex gap-2 flex-wrap">
          {teams.length > 0 && <Btn size="sm" variant="secondary" onClick={autoSeedGroups}><I.bolt size={14} /> Re-Seed</Btn>}
          <Btn size="sm" variant="secondary" onClick={() => setShowImport(true)}><I.users size={14} /> Import</Btn>
          <Btn size="sm" onClick={() => setShowAdd(true)} disabled={teams.length >= maxTeams}><I.plus size={14} /> Add</Btn>
        </div>}
      </div>
      {groups.map(g => (
        <Card key={g} className="p-3">
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-2">
              <div className="w-7 h-7 rounded-md flex items-center justify-center font-display text-stone-950 font-bold" style={{ background: "var(--volt)", color: "#0a0807" }}>{g}</div>
              <span className="font-semibold text-stone-200">Group {g}</span>
            </div>
            <span className="text-xs text-stone-500 font-mono">{byGroup[g].length} / 4</span>
          </div>
          {byGroup[g].length === 0 ? <div className="text-xs text-stone-600 italic px-2 py-3 text-center border border-dashed border-stone-800 rounded-lg">Empty</div>
            : <div className="space-y-1">{byGroup[g].map(t => {
              const p1 = state.players.find(p => p.id === t.p1Id);
              const p2 = state.players.find(p => p.id === t.p2Id);
              return <button key={t.id} onClick={() => isAdmin && setEdit(t)} className="w-full flex items-center gap-2 p-2 rounded-lg bg-stone-900/50 hover:bg-stone-800/70 text-left">
                <div className="flex-1 min-w-0"><div className="text-sm text-stone-100 truncate">{p1?.name || "?"} & {p2?.name || "?"}</div></div>
                {isAdmin && <I.edit size={12} className="text-stone-500" />}
              </button>;
            })}</div>}
        </Card>
      ))}
      {showAdd && <TeamFormModal title="ADD TEAM" state={state} session={session} groups={groups} onClose={() => setShowAdd(false)} onSave={(t) => updateSession(s => ({ ...s, teams: [...(s.teams || []), { id: uid("t"), ...t }] }))} />}
      {edit && <TeamFormModal title="EDIT TEAM" state={state} session={session} groups={groups} initial={edit} onClose={() => setEdit(null)} onSave={(t) => updateSession(s => ({ ...s, teams: s.teams.map(x => x.id === edit.id ? { ...x, ...t } : x) }))} onDelete={() => updateSession(s => ({ ...s, teams: s.teams.filter(x => x.id !== edit.id) }))} />}
      {showImport && <WhatsAppTeamImportModal onClose={() => setShowImport(false)} state={state} session={session} leaderboard={leaderboard || []} onImport={handleImport} />}
    </div>
  );
}

function BracketTab({ session, state, updateSession, isAdmin }) {
  const [edit, setEdit] = useState(null);
  const b = session.bracket || { qf: [], sf: [], final: null };
  const teams = session.teams || [];
  const seedQF = () => {
    const groups = getSessionGroups(session);
    const qCount = getQualifyCount(session);
    const standings = groups.map(g => calcGroupStandings(session, g));
    const N = groups.length;

    // Cross-group seeding (1st of group vs 2nd of opposite group) when top-2 qualify
    if (qCount >= 2 && (N === 2 || N === 4)) {
      const winners = standings.map((s, i) => ({ id: s[0]?.team?.id, seed: groups[i] + "1" }));
      const runners = standings.map((s, i) => ({ id: s[1]?.team?.id, seed: groups[i] + "2" }));
      if (winners.some(w => !w.id) || runners.some(r => !r.id)) { alert("Need top 2 in every group first"); return; }
      // winners[i] vs runners[N-1-i]: A1 vs D2, B1 vs C2, C1 vs B2, D1 vs A2
      const pairs = winners.map((w, i) => ({ a: w, b: runners[N - 1 - i] }));
      if (N === 2) {
        // 4 teams → straight to semifinals
        const sf = pairs.map((p, i) => ({ id: uid("sf"), slot: i + 1, team1Id: p.a.id, team2Id: p.b.id, s1: p.a.seed, s2: p.b.seed, winner: null }));
        updateSession(s => ({ ...s, bracket: { qf: [], sf, final: null } }));
      } else {
        // 8 teams → QF order keeps bracket halves balanced: A1vD2, C1vB2 | B1vC2, D1vA2
        const order = [0, 2, 1, 3];
        const qf = order.map((idx, i) => ({ id: uid("qf"), slot: i + 1, team1Id: pairs[idx].a.id, team2Id: pairs[idx].b.id, s1: pairs[idx].a.seed, s2: pairs[idx].b.seed, winner: null }));
        updateSession(s => ({ ...s, bracket: { qf, sf: [], final: null } }));
      }
      return;
    }

    // Fallback (top-1 qualify, or odd group counts): rank all qualifiers by points
    const qualifiers = [];
    standings.forEach((s, gi) => {
      for (let i = 0; i < qCount; i++) {
        if (s[i]?.team?.id) qualifiers.push({ teamId: s[i].team.id, pts: s[i].pts, wins: s[i].wins, groupRank: i, seed: groups[gi] + (i + 1) });
      }
    });
    if (qualifiers.length === 0) { alert("No qualified teams yet"); return; }
    const seeded = [...qualifiers].sort((a, b) => b.pts - a.pts || b.wins - a.wins || a.groupRank - b.groupRank);
    const total = seeded.length;
    if (total === 2) {
      updateSession(s => ({ ...s, bracket: { qf: [], sf: [], final: { id: uid("f"), team1Id: seeded[0].teamId, team2Id: seeded[1].teamId, s1: seeded[0].seed, s2: seeded[1].seed, winner: null } } }));
    } else if (total <= 4) {
      const sf = [];
      for (let i = 0; i < Math.floor(total / 2); i++) {
        sf.push({ id: uid("sf"), slot: i + 1, team1Id: seeded[i].teamId, team2Id: seeded[total - 1 - i].teamId, s1: seeded[i].seed, s2: seeded[total - 1 - i].seed, winner: null });
      }
      updateSession(s => ({ ...s, bracket: { qf: [], sf, final: null } }));
    } else {
      const pick = [[0,7],[3,4],[1,6],[2,5]];
      const qf = pick.map(([x, y], i) => seeded[x] && seeded[y] ? { id: uid("qf"), slot: i + 1, team1Id: seeded[x].teamId, team2Id: seeded[y].teamId, s1: seeded[x].seed, s2: seeded[y].seed, winner: null } : null).filter(Boolean);
      updateSession(s => ({ ...s, bracket: { qf, sf: [], final: null } }));
    }
  };
  const lbl = (id) => { const t = teams.find(t => t.id === id); if (!t) return "—"; const p1 = state.players.find(p => p.id === t.p1Id)?.name?.split(" ")[0] || "?"; const p2 = state.players.find(p => p.id === t.p2Id)?.name?.split(" ")[0] || "?"; return `${p1} & ${p2}`; };

  useEffect(() => {
    const qfWinners = b.qf.filter(m => m.winner).map(m => m.winner === "team1" ? m.team1Id : m.team2Id);
    if (qfWinners.length === 4 && (b.sf?.length || 0) < 2) {
      updateSession(s => ({ ...s, bracket: { ...s.bracket, sf: [
        { id: uid("sf"), slot: 1, team1Id: qfWinners[0], team2Id: qfWinners[1], winner: null },
        { id: uid("sf"), slot: 2, team1Id: qfWinners[2], team2Id: qfWinners[3], winner: null },
      ] } }));
    }
    const sfWinners = (b.sf || []).filter(m => m.winner).map(m => m.winner === "team1" ? m.team1Id : m.team2Id);
    if (sfWinners.length === 2 && !b.final) {
      updateSession(s => ({ ...s, bracket: { ...s.bracket, final: { id: uid("f"), team1Id: sfWinners[0], team2Id: sfWinners[1], winner: null } } }));
    }
  }, [JSON.stringify(b)]);

  if (!b.qf || b.qf.length === 0) {
    return <Card className="p-6 text-center border-dashed">
      <I.swords className="mx-auto mb-3 text-stone-600" size={36} />
      <div className="text-stone-300 font-semibold mb-1">No bracket yet</div>
      {isAdmin && <><div className="text-stone-500 text-sm mb-4">Auto-seed from group standings</div><Btn onClick={seedQF}><I.bolt size={14} /> Auto-Seed</Btn></>}
    </Card>;
  }
  const champId = b.final?.winner ? (b.final.winner === "team1" ? b.final.team1Id : b.final.team2Id) : null;
  return (
    <div className="space-y-4">
      {champId && <Card className="p-4 text-center" style={{ background: "linear-gradient(135deg, rgba(251, 191, 36, 0.15), rgba(249, 115, 22, 0.08))", borderColor: "rgba(251, 191, 36, 0.4)" }}>
        <I.crown size={32} className="mx-auto text-amber-400 mb-2" />
        <div className="text-xs uppercase tracking-[0.3em] text-amber-400 font-bold mb-1">Champion</div>
        <div className="font-display text-3xl text-stone-50">{lbl(champId)}</div>
      </Card>}
      <Card className="p-3">
        <div className="flex items-center justify-between mb-2"><h3 className="font-display text-lg text-stone-200">QUARTERFINALS</h3><Pill color="orange">+1 each</Pill></div>
        {isAdmin && <div className="text-[10px] text-amber-400 mb-2 flex items-center gap-1"><I.alert size={10} /> Tap to edit (for dropouts)</div>}
        <div className="space-y-1.5">{b.qf.map(m => <BracketRow key={m.id} match={m} lbl={lbl} onClick={() => isAdmin && setEdit({ ...m, round: "qf" })} />)}</div>
      </Card>
      {b.sf?.length > 0 && <Card className="p-3">
        <div className="flex items-center justify-between mb-2"><h3 className="font-display text-lg text-stone-200">SEMIFINALS</h3><Pill color="red">+2 each</Pill></div>
        <div className="space-y-1.5">{b.sf.map(m => <BracketRow key={m.id} match={m} lbl={lbl} onClick={() => isAdmin && setEdit({ ...m, round: "sf" })} />)}</div>
      </Card>}
      {b.final && <Card className="p-3" style={{ borderColor: "rgba(251, 191, 36, 0.3)" }}>
        <div className="flex items-center justify-between mb-2"><h3 className="font-display text-lg text-amber-400">🏆 FINAL</h3><Pill color="amber">+3 reach / +5 win</Pill></div>
        <BracketRow match={b.final} lbl={lbl} onClick={() => isAdmin && setEdit({ ...b.final, round: "final" })} big />
      </Card>}
      {edit && <BracketEditModal match={edit} teams={teams} state={state} onClose={() => setEdit(null)} onSave={(d) => updateSession(s => { const nb = { ...s.bracket }; if (edit.round === "qf") nb.qf = nb.qf.map(m => m.id === edit.id ? { ...m, ...d } : m); else if (edit.round === "sf") nb.sf = nb.sf.map(m => m.id === edit.id ? { ...m, ...d } : m); else nb.final = { ...nb.final, ...d }; return { ...s, bracket: nb }; })} onReset={() => updateSession(s => ({ ...s, bracket: { qf: s.bracket.qf, sf: [], final: null } }))} />}
    </div>
  );
}

function SeedBadge({ seed }) {
  if (!seed) return null;
  return <span className="inline-flex items-center justify-center px-1.5 py-0.5 rounded text-[9px] font-bold font-mono shrink-0" style={{ background: "var(--volt)", color: "#0a0807" }}>{seed}</span>;
}
function BracketRow({ match, lbl, onClick, big }) {
  const w = match.winner;
  return <button onClick={onClick} className={`w-full ${big ? "p-3" : "p-2"} rounded-lg bg-stone-900/50 hover:bg-stone-800/70 text-left`}>
    <div className="flex items-center gap-2">
      <div className={`flex-1 min-w-0 flex items-center gap-1.5 ${big ? "text-base" : "text-sm"} ${w === "team1" ? "text-emerald-400 font-bold" : "text-stone-300"}`}>{w === "team1" && <I.trophy size={big ? 14 : 11} className="shrink-0" />}<SeedBadge seed={match.s1} /><span className="truncate">{lbl(match.team1Id)}</span></div>
      <span className="text-stone-600 font-mono text-xs shrink-0">vs</span>
      <div className={`flex-1 min-w-0 flex items-center justify-end gap-1.5 ${big ? "text-base" : "text-sm"} ${w === "team2" ? "text-emerald-400 font-bold" : "text-stone-300"}`}><span className="truncate">{lbl(match.team2Id)}</span><SeedBadge seed={match.s2} />{w === "team2" && <I.trophy size={big ? 14 : 11} className="shrink-0" />}</div>
    </div>
  </button>;
}

function BracketEditModal({ match, teams, state, onClose, onSave, onReset }) {
  const [t1, setT1] = useState(match.team1Id || "");
  const [t2, setT2] = useState(match.team2Id || "");
  const [w, setW] = useState(match.winner || "");
  const lbl = (id) => { const t = teams.find(t => t.id === id); if (!t) return "?"; const p1 = state.players.find(p => p.id === t.p1Id)?.name?.split(" ")[0] || "?"; const p2 = state.players.find(p => p.id === t.p2Id)?.name?.split(" ")[0] || "?"; return `${p1} & ${p2}`; };
  const titles = { qf: "QUARTERFINAL", sf: "SEMIFINAL", final: "FINAL" };
  return <Modal open={true} onClose={onClose} title={`EDIT ${titles[match.round]}`}>
    <div className="space-y-3">
      <div className="text-xs text-amber-400 bg-amber-400/10 border border-amber-400/30 rounded-lg p-2 flex gap-2"><I.alert size={14} className="shrink-0 mt-0.5" /><span>Edit teams here for dropouts. May need to reset downstream rounds.</span></div>
      <div><label className="text-xs text-stone-400 uppercase tracking-wider font-semibold mb-1 block">Team 1</label><select value={t1} onChange={e => setT1(e.target.value)} className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-stone-100"><option value="">— None —</option>{teams.filter(t => t.id !== t2).map(t => <option key={t.id} value={t.id}>{lbl(t.id)} (Group {t.group})</option>)}</select></div>
      <div><label className="text-xs text-stone-400 uppercase tracking-wider font-semibold mb-1 block">Team 2</label><select value={t2} onChange={e => setT2(e.target.value)} className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-stone-100"><option value="">— None —</option>{teams.filter(t => t.id !== t1).map(t => <option key={t.id} value={t.id}>{lbl(t.id)} (Group {t.group})</option>)}</select></div>
      {t1 && t2 && <div><label className="text-xs text-stone-400 uppercase tracking-wider font-semibold mb-1 block">Winner</label>
        <div className="grid grid-cols-3 gap-2">
          <button onClick={() => setW("team1")} className={`py-2 px-2 rounded-lg text-xs font-semibold ${w === "team1" ? "bg-emerald-500/20 text-emerald-300 border border-emerald-500/40" : "bg-stone-900 text-stone-300 border border-stone-700"}`}>{lbl(t1)}</button>
          <button onClick={() => setW("")} className={`py-2 px-2 rounded-lg text-xs font-semibold ${w === "" ? "bg-stone-700 text-stone-100" : "bg-stone-900 text-stone-500 border border-stone-800"}`}>Pending</button>
          <button onClick={() => setW("team2")} className={`py-2 px-2 rounded-lg text-xs font-semibold ${w === "team2" ? "bg-emerald-500/20 text-emerald-300 border border-emerald-500/40" : "bg-stone-900 text-stone-300 border border-stone-700"}`}>{lbl(t2)}</button>
        </div></div>}
      {match.round === "qf" && <Btn variant="secondary" className="w-full" onClick={() => { onReset(); onClose(); }}>Reset SFs + Final</Btn>}
      <div className="flex gap-2 pt-2"><Btn variant="ghost" onClick={onClose}>Cancel</Btn><Btn onClick={() => { onSave({ team1Id: t1 || null, team2Id: t2 || null, winner: w || null }); onClose(); }}>Save</Btn></div>
    </div>
  </Modal>;
}

function LeaderboardView({ leaderboard, state, setOpenPlayerId }) {
  const [mode, setMode] = useState("season"); // "season" | "lifetime"
  const hasLifetime = leaderboard.some(e => (e.player.prevSeriesPoints || 0) > 0);
  const sorted = mode === "lifetime"
    ? [...leaderboard].sort((a, b) => b.lifetimePts - a.lifetimePts)
    : leaderboard;
  const active = sorted.filter(l => l.stats.sessionsPlayed > 0);
  const inactive = sorted.filter(l => l.stats.sessionsPlayed === 0);
  const rankColors = ["#fbbf24", "#c0c0c0", "#cd7f32"];
  return (
    <div className="space-y-4">
      <div className="flex items-center justify-between">
        <h2 className="font-display text-3xl text-stone-100">LEADERBOARD</h2>
        <Pill color="orange">{active.length} active</Pill>
      </div>
      {hasLifetime && (
        <div className="flex gap-1 p-1 rounded-xl bg-stone-900/60 border border-stone-800">
          {["season","lifetime"].map(m => (
            <button key={m} onClick={() => setMode(m)} className={`flex-1 py-1.5 rounded-lg text-xs font-bold uppercase tracking-wider transition-all ${mode === m ? "text-stone-950 shadow" : "text-stone-500"}`}
              style={{ background: mode === m ? "linear-gradient(135deg,#fbbf24,#f97316)" : "transparent" }}>
              {m === "season" ? "This Series" : "All-Time"}
            </button>
          ))}
        </div>
      )}
      {active.length === 0 ? <Card className="p-8 text-center border-dashed"><I.trophy className="mx-auto mb-3 text-stone-600" size={32} /><div className="text-stone-400">No results yet</div></Card>
        : <div className="space-y-1.5">{active.map((e, i) => {
          const pts = mode === "lifetime" ? e.lifetimePts : e.totalPts;
          const prevPts = e.player.prevSeriesPoints || 0;
          return (
            <div key={e.player.id} className="rounded-xl p-3 cursor-pointer transition-all active:scale-[0.99]"
              style={{ background: "rgba(28,25,23,0.7)", border: `1px solid ${i < 3 ? rankColors[i] + "33" : "rgba(68,64,60,0.5)"}` }}
              onClick={() => setOpenPlayerId(e.player.id)}>
              <div className="flex items-center gap-3">
                <div className="w-8 text-center shrink-0">
                  {i < 3 ? <div className="w-7 h-7 rounded-lg flex items-center justify-center font-display text-xs font-bold text-stone-950 mx-auto" style={{ background: rankColors[i], boxShadow: `0 0 10px ${rankColors[i]}66` }}>{i+1}</div>
                    : <span className="font-mono text-stone-500 text-sm">{i + 1}</span>}
                </div>
                <Avatar player={e.player} size={38} />
                <div className="flex-1 min-w-0">
                  <div className="font-semibold truncate" style={{ color: i === 0 ? "#fbbf24" : "#f5f5f4" }}>{e.player.name}</div>
                  <div className="text-[10px] text-stone-500 mt-0.5 flex items-center gap-2">
                    <span>{e.stats.sessionsPlayed} sess</span><span>·</span><span>{e.stats.groupWins}W</span>
                    {e.stats.finalsWon > 0 && <><span>·</span><span className="text-amber-400 font-semibold">{e.stats.finalsWon} finals</span></>}
                    {mode === "lifetime" && prevPts > 0 && <><span>·</span><span className="text-blue-400">+{prevPts} prev</span></>}
                  </div>
                </div>
                <div className="text-right shrink-0">
                  <div className="font-mono font-bold text-2xl" style={{ color: i === 0 ? "#fbbf24" : i < 3 ? "#f97316" : "#e7e5e4" }}>{pts}</div>
                  <div className="text-[9px] text-stone-500 uppercase">pts</div>
                </div>
              </div>
            </div>
          );
        })}</div>}
      {inactive.length > 0 && <details className="text-xs text-stone-500"><summary className="cursor-pointer py-2">+ {inactive.length} not yet playing</summary><div className="space-y-1 mt-2">{inactive.map(e => <div key={e.player.id} className="flex items-center gap-2 px-3 py-1.5 rounded bg-stone-900/40"><Avatar player={e.player} size={24} /><span>{e.player.name}</span></div>)}</div></details>}
    </div>
  );
}

function PlayerDetail({ playerId, state, leaderboard, onClose }) {
  const player = state.players.find(p => p.id === playerId);
  const entry = leaderboard.find(l => l.player.id === playerId);
  if (!player || !entry) return null;
  const rank = leaderboard.findIndex(l => l.player.id === playerId) + 1;
  const locked = getLockedPartners(playerId, state.sessions);
  const lockedNames = Array.from(locked).map(id => state.players.find(p => p.id === id)?.name).filter(Boolean);
  const prevPts = player.prevSeriesPoints || 0;
  return <Modal open={true} onClose={onClose} title={player.name.toUpperCase()}>
    <div className="space-y-4">
      <div className="text-center py-3">
        <div className="flex justify-center mb-3"><Avatar player={player} size={72} /></div>
        <div className="text-xs text-stone-500 uppercase tracking-wider mb-1">Rank #{rank}</div>
        <div className="font-mono text-5xl font-bold" style={{ color: rank === 1 ? "#fbbf24" : rank <= 3 ? "#f97316" : "#fafaf9" }}>{entry.totalPts}</div>
        <div className="text-xs text-stone-500 uppercase tracking-wider">this series</div>
        {prevPts > 0 && <div className="text-sm text-blue-400 mt-1 font-mono">+{prevPts} prev series = <span className="font-bold text-stone-200">{entry.lifetimePts}</span> lifetime</div>}
      </div>
      <div className="grid grid-cols-2 gap-2">
        <Card className="p-3"><div className="text-[10px] text-stone-500 uppercase tracking-wider mb-1">Match</div><div className="font-mono text-2xl font-bold text-stone-100">{entry.breakdown.matchPts}</div></Card>
        <Card className="p-3"><div className="text-[10px] text-stone-500 uppercase tracking-wider mb-1">Knockout</div><div className="font-mono text-2xl font-bold text-red-400">{entry.breakdown.knockoutPts}</div></Card>
        <Card className="p-3"><div className="text-[10px] text-stone-500 uppercase tracking-wider mb-1">Top of Group</div><div className="font-mono text-2xl font-bold text-amber-400">+{entry.breakdown.topOfGroup}</div></Card>
        <Card className="p-3"><div className="text-[10px] text-stone-500 uppercase tracking-wider mb-1">🔥 Streak</div><div className="font-mono text-2xl font-bold text-orange-500">+{entry.breakdown.streakPts}</div></Card>
      </div>
      <Card className="p-3">
        <div className="grid grid-cols-2 gap-3 text-sm">
          <div><span className="text-stone-500">Sessions: </span><span className="text-stone-200 font-mono">{entry.stats.sessionsPlayed}</span></div>
          <div><span className="text-stone-500">Group Wins: </span><span className="text-stone-200 font-mono">{entry.stats.groupWins}/{entry.stats.groupPlayed}</span></div>
          <div><span className="text-stone-500">SFs: </span><span className="text-stone-200 font-mono">{entry.stats.sfReached}</span></div>
          <div><span className="text-stone-500">Finals: </span><span className="text-amber-400 font-mono font-bold">{entry.stats.finalsWon}🏆 / {entry.stats.finalsReached}</span></div>
        </div>
      </Card>
      {lockedNames.length > 0 && <Card className="p-3" style={{ borderColor: "rgba(220, 38, 38, 0.3)" }}>
        <div className="flex items-center gap-2 mb-2"><I.lock size={14} className="text-red-400" /><div className="text-xs text-red-400 uppercase tracking-wider font-bold">Loyalty Lockout</div></div>
        <div className="text-xs text-stone-400 mb-2">Won with — can't pair again:</div>
        <div className="flex flex-wrap gap-1">{lockedNames.map(n => <Pill key={n} color="red">{n}</Pill>)}</div>
      </Card>}
    </div>
  </Modal>;
}

function SettingsView({ state, update, setState, setTab, logout }) {
  const [showRst, setShowRst] = useState(false);
  const [showExp, setShowExp] = useState(false);
  return (
    <div className="space-y-4">
      <h2 className="font-display text-3xl text-stone-100">SETTINGS</h2>
      <Card className="p-4 space-y-3">
        <div><label className="text-xs text-stone-400 uppercase tracking-wider font-semibold mb-1 block">Season Name</label><Input value={state.seasonName} onChange={v => update(s => ({ ...s, seasonName: v }))} /></div>
        <div><label className="text-xs text-stone-400 uppercase tracking-wider font-semibold mb-1 block">Subtitle</label><Input value={state.seasonSubtitle || ""} onChange={v => update(s => ({ ...s, seasonSubtitle: v }))} /></div>
        <div><label className="text-xs text-stone-400 uppercase tracking-wider font-semibold mb-1 block">Tagline</label><Input value={state.seasonTagline} onChange={v => update(s => ({ ...s, seasonTagline: v }))} /></div>
      </Card>
      <Card className="p-4">
        <h3 className="font-display text-lg text-stone-200 mb-3">POINT SYSTEM</h3>
        <div className="space-y-2 text-sm">
          <div className="flex justify-between"><span className="text-stone-300">✅ Win</span><span className="font-mono text-emerald-400">+3</span></div>
          <div className="flex justify-between"><span className="text-stone-300">🎯 Tiebreak Loss</span><span className="font-mono text-amber-400">+2</span></div>
          <div className="flex justify-between"><span className="text-stone-300">🤝 Competitive Loss</span><span className="font-mono text-orange-400">+1</span></div>
          <div className="flex justify-between"><span className="text-stone-300">❌ 6-0/6-1 Loss</span><span className="font-mono text-stone-500">0</span></div>
          <div className="border-t border-stone-800 my-2" />
          <div className="flex justify-between"><span className="text-stone-300">🥇 Top of Group</span><span className="font-mono text-amber-400">+1</span></div>
          <div className="flex justify-between"><span className="text-stone-300">🎯 Reach QF</span><span className="font-mono text-orange-400">+1</span></div>
          <div className="flex justify-between"><span className="text-stone-300">🔥 Reach SF</span><span className="font-mono text-orange-400">+2</span></div>
          <div className="flex justify-between"><span className="text-stone-300">⚔️ Reach Final</span><span className="font-mono text-red-400">+3</span></div>
          <div className="flex justify-between"><span className="text-stone-300">🏆 Win Final</span><span className="font-mono text-amber-400 font-bold">+5</span></div>
          <div className="border-t border-stone-800 my-2" />
          <div className="flex justify-between"><span className="text-stone-300">🔥 Streak Max</span><span className="font-mono text-orange-500 font-bold">+5</span></div>
        </div>
      </Card>
      <Card className="p-4">
        <h3 className="font-display text-lg text-stone-200 mb-3">DATA</h3>
        <div className="space-y-2">
          <Btn variant="secondary" className="w-full" onClick={() => setShowExp(true)}><I.download size={14} /> Export JSON</Btn>
          <Btn variant="danger" className="w-full" onClick={() => setShowRst(true)}><I.trash size={14} /> Reset Everything</Btn>
          <Btn variant="ghost" className="w-full" onClick={logout}>Sign out of organizer mode</Btn>
        </div>
      </Card>
      <button onClick={() => setTab("dashboard")} className="w-full py-3 text-sm text-stone-500">← Back to Dashboard</button>
      {showRst && <Modal open={true} onClose={() => setShowRst(false)} title="RESET ALL?">
        <div className="space-y-3"><div className="text-sm text-stone-300">Permanently delete everything?</div>
          <div className="flex gap-2"><Btn variant="ghost" onClick={() => setShowRst(false)}>Cancel</Btn><Btn variant="danger" onClick={() => { setState(initState()); setShowRst(false); setTab("dashboard"); }}>Reset</Btn></div>
        </div></Modal>}
      {showExp && <Modal open={true} onClose={() => setShowExp(false)} title="EXPORT">
        <div className="space-y-3"><div className="text-xs text-stone-400">Copy to back up:</div>
          <textarea readOnly value={JSON.stringify(state, null, 2)} rows={10} className="w-full bg-stone-900 border border-stone-700 rounded-lg px-3 py-2.5 text-stone-100 font-mono text-xs" />
          <Btn className="w-full" onClick={() => navigator.clipboard?.writeText(JSON.stringify(state, null, 2))}>Copy</Btn>
        </div></Modal>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
