# Add these location blocks INSIDE the existing server {} block in
# /etc/nginx/sites-available/urbanpadel.om
# Place them BEFORE the existing root / location block.

    # June Fury API proxy
    location ~ ^/(state|login|save)$ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
        add_header         Access-Control-Allow-Origin  "https://urbanpadel.om" always;
        add_header         Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header         Access-Control-Allow-Headers "Content-Type, Authorization" always;
        if ($request_method = OPTIONS) { return 204; }
    }
